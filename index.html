     &lt;div class=&quot;ball&quot; draggable=&quot;true&quot; id=&quot;ball-1&quot;&gt;&lt;/div&gt;

  &lt;script&gt;
        const state = {
            isTeachingMode: false,
            emptyBoxId: null,
            boxCounts: { 1: 0, 2: 0, 3: 0, 4: 0 },
            totalBalls: 6,
            placedBalls: 0
        };

        const boxes = document.querySelectorAll('.box');
        const balls = document.querySelectorAll('.ball');
        const ballPool = document.getElementById('ballPool');
        const modeToggle = document.getElementById('modeToggle');
        const guideArea = document.getElementById('guideArea');
        const resultPanel = document.getElementById('resultPanel');
        const resultText = document.getElementById('resultText');

        // 初始化拖拽
        function initDragAndDrop() {
            balls.forEach(ball =&gt; {
                ball.addEventListener('dragstart', (e) =&gt; {
                    e.dataTransfer.setData('text/plain', ball.id);
                    ball.style.opacity = '0.5';
                });
                ball.addEventListener('dragend', () =&gt; {
                    ball.style.opacity = '1';
                });
            });

            boxes.forEach(box =&gt; {
                box.addEventListener('dragover', (e) =&gt; {
                    if (box.classList.contains('disabled')) return;
                    e.preventDefault();
                    box.classList.add('highlight');
                });

                box.addEventListener('dragleave', () =&gt; {
                    box.classList.remove('highlight');
                });

                box.addEventListener('drop', (e) =&gt; {
                    e.preventDefault();
                    box.classList.remove('highlight');
                    const ballId = e.dataTransfer.getData('text/plain');
                    const ball = document.getElementById(ballId);
                    
                    if (box.classList.contains('disabled')) return;

                    placeBallInBox(ball, box);
                });
            });

            // 允许放回球池
            ballPool.addEventListener('dragover', (e) =&gt; e.preventDefault());
            ballPool.addEventListener('drop', (e) =&gt; {
                const ballId = e.dataTransfer.getData('text/plain');
                const ball = document.getElementById(ballId);
                if (ball.parentElement !== ballPool) {
                    const oldBoxId = ball.parentElement.closest('.box')?.dataset.id;
                    if (oldBoxId) {
                        state.boxCounts[oldBoxId]--;
                        updateBoxDisplay(oldBoxId);
                        state.placedBalls--;
                    }
                    ballPool.appendChild(ball);
                    checkStatus();
                }
            });
        }

        function placeBallInBox(ball, box) {
            const boxId = box.dataset.id;
            const oldBoxId = ball.parentElement.closest('.box')?.dataset.id;

            if (oldBoxId === boxId) return;

            if (oldBoxId) {
                state.boxCounts[oldBoxId]--;
                updateBoxDisplay(oldBoxId);
            } else {
                state.placedBalls++;
            }

            state.boxCounts[boxId]++;
            box.querySelector('.ball-slot').appendChild(ball);
            updateBoxDisplay(boxId);
            
            // 动画效果
            anime({
                targets: ball,
                scale: [1.5, 1],
                duration: 400,
                easing: 'easeOutElastic(1, .8)'
            });

            checkStatus();
        }

        function updateBoxDisplay(id) {
            const box = document.querySelector(`.box[data-id=&quot;${id}&quot;]`);
            box.querySelector('.ball-count').textContent = state.boxCounts[id];
        }

        function checkStatus() {
            if (state.placedBalls === state.totalBalls) {
                const counts = Object.values(state.boxCounts);
                const zeroCount = counts.filter(c =&gt; c === 0).length;

                if (zeroCount === 1) {
                    showSuccess(&quot;🎉 太棒了！恰好有一个空盒子，方案符合要求！&quot;);
                    confetti({
                        particleCount: 100,
                        spread: 70,
                        origin: { y: 0.6 }
                    });
                } else {
                    showError(`当前有 ${zeroCount} 个空盒子，不符合&ldquo;恰好1个&rdquo;的要求。`);
                }
            } else {
                resultPanel.classList.add('hidden');
            }

            // 教学模式引导逻辑
            if (state.isTeachingMode) {
                const activeBoxes = Array.from(boxes).filter(b =&gt; !b.classList.contains('disabled'));
                const allActiveHaveBall = activeBoxes.every(b =&gt; state.boxCounts[b.dataset.id] &gt;= 1);
                
                if (allActiveHaveBall) {
                    document.getElementById('step2').classList.remove('active');
                    document.getElementById('step3').classList.add('active');
                } else {
                    document.getElementById('step2').classList.add('active');
                    document.getElementById('step3').classList.remove('active');
                }
            }
        }

        function showSuccess(msg) {
            resultPanel.classList.remove('hidden');
            resultText.textContent = msg;
            resultText.className = &quot;text-xl font-bold text-green-600&quot;;
        }

        function showError(msg) {
            resultPanel.classList.remove('hidden');
            resultText.textContent = msg;
            resultText.className = &quot;text-xl font-bold text-orange-600&quot;;
        }

        // 教学模式切换
        modeToggle.addEventListener('change', (e) =&gt; {
            state.isTeachingMode = e.target.checked;
            resetAll();
            if (state.isTeachingMode) {
                guideArea.classList.remove('hidden');
                document.getElementById('step1').classList.add('active');
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.remove('active');
                
                // 盒子点击选择空盒
                boxes.forEach(box =&gt; {
                    box.onclick = () =&gt; {
                        if (state.emptyBoxId === null) {
                            state.emptyBoxId = box.dataset.id;
                            box.classList.add('disabled');
                            document.getElementById('step1').classList.remove('active');
                            document.getElementById('step2').classList.add('active');
                            boxes.forEach(b =&gt; b.onclick = null);
                        }
                    };
                });
            } else {
                guideArea.classList.add('hidden');
                boxes.forEach(box =&gt; {
                    box.classList.remove('disabled');
                    box.onclick = null;
                });
            }
        });

        function resetAll() {
            state.boxCounts = { 1: 0, 2: 0, 3: 0, 4: 0 };
            state.placedBalls = 0;
            state.emptyBoxId = null;
            
            balls.forEach(ball =&gt; ballPool.appendChild(ball));
            boxes.forEach(box =&gt; {
                updateBoxDisplay(box.dataset.id);
                box.classList.remove('disabled', 'highlight');
            });
            resultPanel.classList.add('hidden');
            
            if (state.isTeachingMode) {
                document.getElementById('step1').classList.add('active');
                document.getElementById('step2').classList.remove('active');
                document.getElementById('step3').classList.remove('active');
                // 重新绑定点击
                boxes.forEach(box =&gt; {
                    box.onclick = () =&gt; {
                        if (state.emptyBoxId === null) {
                            state.emptyBoxId = box.dataset.id;
                            box.classList.add('disabled');
                            document.getElementById('step1').classList.remove('active');
                            document.getElementById('step2').classList.add('active');
                            boxes.forEach(b =&gt; b.onclick = null);
                        }
                    };
                });
            }
        }

        document.getElementById('resetBtn').addEventListener('click', resetAll);

        // 初始化
        initDragAndDrop();
    &lt;/script&gt;

  <script>

    function getIsMobile() {
      const width = document.documentElement.clientWidth
      const isMobile = /Android|webOS|iPhone|iPod|BlackBerry|iPad|Windows Phone|Mobile/i.test(navigator.userAgent) || width <= 768
      return isMobile
    }

    // 打开飞象老师官网
    function openFeixiangTeacher(event) {
      const isMobile = getIsMobile()

      // 判断是否为移动端浏览器
      if (isMobile) {
        // 移动端不跳转
        return
      }
      window.open('https://www.feixianglaoshi.com', '_blank')
    }


    // ==================== 埋点相关代码 ====================

    /**
     * 页面停留时长统计
     */
    (function () {
      let startTime = null
      let totalTime = 0
      let reportTimer = null // 防抖定时器

      // 开始计时
      function startTimer() {
        if (!startTime) {
          startTime = Date.now()
          console.log('[埋点] 开始计时')
        }
      }

      // 停止计时并累加时长
      function stopTimer() {
        if (startTime) {
          totalTime += Date.now() - startTime
          startTime = null
          console.log('[埋点] 停止计时，累计时长:', Math.floor(totalTime / 1000), '秒')
        }
      }

      // 检查页面是否真正可见
      function isPageVisible() {
        // 检查 document.hidden
        if (document.hidden) {
          return false
        }

        // 检查 document.visibilityState
        if (document.visibilityState && document.visibilityState !== 'visible') {
          return false
        }

        // 检查窗口是否有焦点
        if (!document.hasFocus()) {
          return false
        }

        return true
      }

      // 上报停留时长（带防抖）
      function reportStayTime(eventType, immediate = false) {
        stopTimer()

        // 清除之前的定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 如果是立即上报（如页面卸载），不使用防抖
        if (immediate) {
          doReport(eventType)
          return
        }

        // 使用防抖，避免短时间内多次上报
        // 100ms 内如果有多个事件触发，只上报最后一次
        reportTimer = setTimeout(function () {
          doReport(eventType)
          reportTimer = null
        }, 100)
      }

      // 实际执行上报
      function doReport(eventType) {
        if (window.frog && totalTime > 0) {
          const serverData = window.__SERVER_DATA__ || {}
          const chatId = serverData.watermarkChatId
          window.frog.add({
            url: '/time/HtmlPage/enter',
            eventId: 42818,
            customExtend: {
              chat_id: chatId,
              use_time: Math.floor(totalTime / 1000), // 转换为秒
            },
            duration: Math.floor(totalTime / 1000), // 转换为秒,
            currentPage: 'HtmlPage',
            eventAction: 'time',
            eventName: 'enter'
          })
          console.log(`[埋点] 页面停留时长上报 (${eventType}):`, Math.floor(totalTime / 1000), '秒')

          // 上报后重置累计时长，为下次统计做准备
          totalTime = 0
        }
      }

      // 清理函数：移除所有事件监听器
      function cleanup() {
        console.log('[埋点] 清理计时器资源')

        // 清除防抖定时器
        if (reportTimer) {
          clearTimeout(reportTimer)
          reportTimer = null
        }

        // 移除事件监听器
        document.removeEventListener('visibilitychange', handleVisibilityChange)
        window.removeEventListener('blur', handleBlur)
        window.removeEventListener('focus', handleFocus)
        window.removeEventListener('beforeunload', handleBeforeUnload)
        window.removeEventListener('pagehide', handlePageHide)

        // 重置变量
        startTime = null
        totalTime = 0
      }

      // 事件处理函数（需要命名以便移除）
      function handleVisibilityChange() {
        if (document.hidden) {
          // 页面不可见，停止计时并上报
          console.log('[埋点] visibilitychange - 页面隐藏')
          reportStayTime('visibilitychange')
        } else {
          // 页面可见，开始新的计时
          console.log('[埋点] visibilitychange - 页面显示，开始新的计时')
          startTimer()
        }
      }

      function handleBlur() {
        // 窗口失去焦点，停止计时并上报
        console.log('[埋点] blur - 窗口失去焦点')
        reportStayTime('blur')
      }

      function handleFocus() {
        // 窗口获得焦点，开始新的计时
        console.log('[埋点] focus - 窗口获得焦点，开始新的计时')
        startTimer()
      }

      function handleBeforeUnload() {
        // 页面卸载前立即上报（不使用防抖）
        console.log('[埋点] beforeunload - 页面即将卸载')
        reportStayTime('beforeunload', true)
        cleanup()
      }

      function handlePageHide() {
        // 页面隐藏时立即上报（iOS Safari 更可靠，不使用防抖）
        console.log('[埋点] pagehide - 页面隐藏')
        reportStayTime('pagehide', true)
      }

      function handleDOMContentLoaded() {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 监听页面可见性变化
      document.addEventListener('visibilitychange', handleVisibilityChange)

      // 监听窗口失去/获得焦点
      window.addEventListener('blur', handleBlur)
      window.addEventListener('focus', handleFocus)

      // 页面加载完成后开始计时
      if (document.readyState === 'loading') {
        window.addEventListener('DOMContentLoaded', handleDOMContentLoaded)
      } else {
        if (isPageVisible()) {
          startTimer()
        }
      }

      // 页面卸载时上报
      window.addEventListener('beforeunload', handleBeforeUnload)

      // 兼容性：监听 pagehide 事件（iOS Safari 更可靠）
      window.addEventListener('pagehide', handlePageHide)
    })()

    /**
     * 点击飞象老师 Logo 的埋点
     */
    function trackLogoClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)

        window.frog.add({
          url: '/click/HtmlPage/logo',
          eventId: 42816,
          customExtend: {
            chat_id: chatId,
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'logo'
        })

        console.log('[埋点] 点击飞象老师 Logo')
      }
    }

    /**
     * 点击立即体验的埋点
     */
    function trackStartButtonClick(event) {
      // 阻止事件冒泡，避免触发 HTML 点击埋点
      event.stopPropagation()

      if (window.frog) {
        const serverData = window.__SERVER_DATA__ || {}
        const chatId = serverData.watermarkChatId
        console.log('trackHtmlClick', chatId)
        window.frog.add({
          url: '/click/HtmlPage/start',
          eventId: 42817,
          customExtend: {
            chat_id: chatId
          },
          currentPage: 'HtmlPage',
          eventAction: 'click',
          eventName: 'start'
        })
        console.log('[埋点] 点击立即体验')
      }
    }

    // 绑定点击事件
    document.addEventListener('DOMContentLoaded', function () {
      // 绑定 Logo 点击埋点和跳转功能
      const logoElement = document.querySelector('.left-watermark-content')
      if (logoElement) {
        logoElement.addEventListener('click', function (event) {
          trackLogoClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定立即体验按钮点击埋点和跳转功能
      const startButton = document.querySelector('.jump-button')
      if (startButton) {
        startButton.addEventListener('click', function (event) {
          trackStartButtonClick(event)
          openFeixiangTeacher(event)
        })
      }

      // 绑定水印覆盖层点击（整体区域）
      const watermarkOverlay = document.querySelector('.watermark-overlay')
      if (watermarkOverlay) {
        watermarkOverlay.addEventListener('click', function (event) {
          // 如果点击的不是 logo 或按钮，则触发跳转
          const target = event.target
          const isLogo = target.closest('.left-watermark-content')
          const isButton = target.closest('.jump-button')

          if (!isLogo && !isButton) {
            openFeixiangTeacher(event)
          }
        })
      }
    })

    // ==================== 原有功能代码 ====================

    function adjustRem() {
      const pcBaseWidth = 375 // 设计稿
      const width = document.documentElement.clientWidth
      document.documentElement.style.fontSize = `${(width / pcBaseWidth * 100).toFixed(2)}px`
    }


    // 移动端检测和按钮隐藏逻辑
    function checkAndHideButtonOnMobile() {
      const isMobile = getIsMobile()
      if (isMobile) {
        adjustRem()
      }
      const jumpButton = document.querySelector('.right-watermark-content .jump-button');
      const iframeContainer = document.querySelector('.iframe-container');

      if (isMobile && jumpButton) {
        jumpButton.style.display = 'none';
      } else {
        jumpButton.style.display = 'flex'
      }

      // 移动端时给iframe-container添加类名，否则移除类名
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }


    function handleResize() {
      // 响应式处理：重新检测移动端并处理按钮显示/隐藏
      checkAndHideButtonOnMobile();

      // 在窗口大小变化时，重新应用移动端相关的逻辑
      const isMobile = getIsMobile()
      const watermarkOverlay = document.querySelector('.watermark-overlay');
      const iframeContainer = document.querySelector('.iframe-container');

      // 根据当前设备类型调整水印覆盖层的点击行为
      if (watermarkOverlay) {
        if (isMobile) {
          // 移动端：移除点击事件或设置为空函数
          watermarkOverlay.onclick = function () {
            // 移动端不执行跳转
            return;
          };
        } else {
          // 桌面端：恢复正常的点击跳转功能
          watermarkOverlay.onclick = openFeixiangTeacher;
        }
      }

      // 确保在resize时也能正确添加或移除mobile类
      if (iframeContainer) {
        if (isMobile) {
          iframeContainer.classList.add('mobile');
        } else {
          iframeContainer.classList.remove('mobile');
        }
      }
    }

    // 防止iframe内容溢出
    window.addEventListener('resize', handleResize);

    // 页面加载完成后执行移动端检测
    document.addEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);

    // 清理所有事件绑定的函数
    function clearAllEvents() {
      // 清除 resize 事件监听器
      window.removeEventListener('resize', handleResize);

      // 清除 DOMContentLoaded 事件监听器
      document.removeEventListener('DOMContentLoaded', checkAndHideButtonOnMobile);
    }

    // 页面卸载时自动清理事件（可选）
    window.addEventListener('beforeunload', clearAllEvents);
